server {
    listen 80;
    server_name _;  # Accept requests from any hostname/IP — works on any machine

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend (same-origin from browser perspective)
    # This means the browser always talks to the same origin — no CORS needed
    location /api {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
