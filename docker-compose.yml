version: "3"

services:
  server:
    container_name: craievich-server
    build: ./server
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=sportbooking
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npx nodemon src/app.js

  client:
    container_name: craievich-client
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - server

  db:
    container_name: craievich-db
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=sportbooking
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
